<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <link href="https://cdn.jsdelivr.net/npm/video.js@8.23.7/dist/video-js.css" rel="stylesheet">
</head>
<body>
  <video id="video" class="video-js vjs-default-skin"
    controls muted preload="metadata">
   <source src="https://gumlet.sgp1.digitaloceanspaces.com/unittest_videos/playerjs-demo.mp4" type='video/mp4' />
  </video>
  <script src="https://cdn.jsdelivr.net/npm/video.js@8.23.7/dist/video.js"></script>
  <script src="/dist/main.global.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      videojs("video", {}, function(){
        var adapter = new playerjs.VideoJSAdapter(this);

        adapter.ready();
      });
    });
  </script>
</body>
</html>
